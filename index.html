using namespace std;

struct Node {
    int data; Node* left; Node* right;
    Node(int v) : data(v), left(nullptr), right(nullptr) {}
};

// Рекурсивный обход с накоплением глубины
void calcPath(Node* root, int depth, int& totalPath, int& count) {
    if (!root) return;
    
    totalPath += depth; // Прибавляем глубину текущего узла
    count++;            // Считаем узел
    
    calcPath(root->left, depth + 1, totalPath, count);
    calcPath(root->right, depth + 1, totalPath, count);
}

double getAvgInternalPath(Node* root) {
    if (!root) return 0.0;
    
    int totalPath = 0;
    int count = 0;
    
    // Вызов от корня (глубина 0)
    calcPath(root, 0, totalPath, count);
    
    return static_cast<double>(totalPath) / count;
}

int main() {
    Node* root = new Node(10);
    root->left = new Node(5);
    root->right = new Node(15);
    
    cout << "Средний внутренний путь: " << getAvgInternalPath(root) << endl;
    return 0;
}`

                        <p>Как только размер подмассива становится равен или меньше порога <code>K</code>, рекурсия принудительно останавливается. Массив остается «почти отсортированным». Для окончательной доводки таких мелких участков применяется локальная Сортировка обменом (Пузырек), которая работает на них мгновенно благодаря кэшу процессора.</p>`,

#include <vector>
using namespace std;

// Локальная сортировка обменом
void bubbleLocal(vector<int>& a, int l, int r) {
    for (int i = l; i < r; i++) {
        bool swapped = false;
        for (int j = l; j < r - (i - l); j++) {
            if (a[j] > a[j+1]) {
                swap(a[j], a[j+1]);
                swapped = true;
            }
        }
        // Оптимизация: выход при отсортированном участке
        if (!swapped) break;
    }
}

// Модифицированная Быстрая сортировка
void quickHybrid(vector<int>& a, int l, int r, int K) {
    // Остановка рекурсии при малом размере
    if (r - l + 1 <= K) {
        if (l < r) bubbleLocal(a, l, r);
        return;
    }

    int i = l, j = r;
    int pivot = a[l + (r - l) / 2];

    while (i <= j) {
        while (a[i] < pivot) i++;
        while (a[j] > pivot) j--;
        if (i <= j) {
            swap(a[i], a[j]);
            i++; j--;
        }
    }

    if (l < j) quickHybrid(a, l, j, K);
    if (i < r) quickHybrid(a, i, r, K);
}

int main() {
    vector<int> arr = {42, 12, 85, 33, 64, 21, 9, 50, 11, 4};
    int K = 3; // Порог гибридизации
    
    quickHybrid(arr, 0, arr.size() - 1, K);
    
    for (int x : arr) cout << x << " ";
    return 0;
}`

#include <vector>
#include <queue>
using namespace std;

int countEnclosedZeros(vector<vector<int>>& grid) {
    int N = grid.size();
    if (N == 0) return 0;
    queue<pair<int, int>> q;

    // 1. Поиск стартовых нулей на границе матрицы
    for (int i = 0; i < N; i++) {
        for (int j = 0; j < N; j++) {
            if (i == 0 || i == N - 1 || j == 0 || j == N - 1) {
                if (grid[i][j] == 0) {
                    q.push({i, j});
                    grid[i][j] = 2; // Помечаем как "наружный"
                }
            }
        }
    }

    // 2. Распространение волны (Поиск в ширину / BFS)
    int dx[] = {-1, 1, 0, 0};
    int dy[] = {0, 0, -1, 1};
    
    while (!q.empty()) {
        auto [x, y] = q.front(); 
        q.pop();
        
        for (int i = 0; i < 4; i++) {
            int nx = x + dx[i], ny = y + dy[i];
            if (nx >= 0 && nx < N && ny >= 0 && ny < N && grid[nx][ny] == 0) {
                grid[nx][ny] = 2;
                q.push({nx, ny});
            }
        }
    }

    // 3. Подсчет выживших нулей (замкнутых внутри)
    int count = 0;
    for (int i = 0; i < N; i++)
        for (int j = 0; j < N; j++)
            if (grid[i][j] == 0) count++;
            
    return count;
}`

                    code: `#include <iostream>
#include <vector>
using namespace std;

// Модифицированная сортировка простыми включениями (справа налево)
void insertionSortEndBarrier(vector<int>& arr) {
    if (arr.empty()) return;
    int n = arr.size();
    
    // Временно увеличиваем массив для хранения барьера
    arr.push_back(0); 

    // Внешний цикл идет справа налево
    for (int i = n - 2; i >= 0; i--) {
        int key = arr[i];
        
        // Установка барьера в самый конец
        arr[n] = key; 

        int j = i + 1;
        
        // Внутренний цикл (сдвиг влево)
        // Отсутствует проверка выхода за границы (j < n) - барьер остановит цикл!
        while (arr[j] < key) {
            arr[j - 1] = arr[j];
            j++;
        }
        
        // Вставка на освободившееся место
        arr[j - 1] = key;
    }
    
    // Возвращаем исходный размер массива
    arr.pop_back(); 
}

int main() {
    vector<int> data = {42, 12, 85, 33, 64, 21, 9, 50};
    insertionSortEndBarrier(data);
    for(int num : data) cout << num << " ";
    return 0;
}`

using namespace std;

void printSubsets(const vector<int>& set) {
    int n = set.size();
    
    // Общее количество подмножеств: 2^n
    int totalSubsets = 1 << n; 

    // Перебор масок от 00..00 до 11..11
    for (int mask = 0; mask < totalSubsets; mask++) {
        cout << "{ ";
        
        for (int i = 0; i < n; i++) {
            // Если i-й бит в маске включен (равен 1), выводим элемент
            if ((mask & (1 << i)) != 0) {
                cout << set[i] << " ";
            }
        }
        cout << "}\\n";
    }
}

int main() {
    vector<int> mySet = {10, 20, 30};

}`

struct Node { int data; Node* left; Node* right; };

// Функция расчета внешнего пути
void calcExtPath(Node* root, int depth, int& totalPath, int& count) {
    // Прибавляем путь ТОЛЬКО если наткнулись на пустоту (внешний узел)
    if (root == nullptr) {
        totalPath += depth;
        count++;
        return; // Возврат, так как дальше идти некуда
    }
    
    // Для реальных узлов просто проваливаемся глубже
    calcExtPath(root->left, depth + 1, totalPath, count);
    calcExtPath(root->right, depth + 1, totalPath, count);
}

double getAvgExtPath(Node* root) {
    int total = 0, count = 0;
    
    calcExtPath(root, 0, total, count);
    
    if (count == 0) return 0.0;
    return static_cast<double>(total) / count;
}`

using namespace std;

// Тасование Фишера-Йетса (Сложность O(N))
vector<int> fisherYatesShuffle(int N) {
    vector<int> arr(N);
    for (int i = 0; i < N; i++) {
        arr[i] = i + 1;
    }

    // Проход с конца к началу
    for (int i = N - 1; i > 0; i--) {
        // Выбор случайного индекса от 0 до i включительно
        int j = rand() % (i + 1);
        
        // Обмен элементами
        swap(arr[i], arr[j]);
    }
    return arr;
}

int main() {
    srand(time(0));
    
    vector<int> result = fisherYatesShuffle(10);
    
    cout << "Стартовые номера лыжников:\\n";
    for(int num : result) {
        cout << num << " ";

    return 0;
